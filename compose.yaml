services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: zoneblitz
      POSTGRES_USER: zoneblitz
      POSTGRES_PASSWORD: zoneblitz
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoneblitz -d zoneblitz"]
      interval: 5s
      timeout: 5s
      retries: 10

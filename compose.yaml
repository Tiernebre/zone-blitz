services:
  postgres:
    image: postgres:16-alpine
    container_name: zoneblitz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zoneblitz
      POSTGRES_USER: zoneblitz
      POSTGRES_PASSWORD: zoneblitz
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoneblitz -d zoneblitz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

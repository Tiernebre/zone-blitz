name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build \
            --build-arg GIT_SHA="${{ github.sha }}" \
            -t ghcr.io/tiernebre/zone-blitz:latest \
            .
          docker push ghcr.io/tiernebre/zone-blitz:latest

      - name: Copy docker-compose.prod.yml to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: /opt/zone-blitz/

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ghcr.io/tiernebre/zone-blitz:latest
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE
          script: |
            set -euo pipefail
            cd /opt/zone-blitz

            # If the disk is under pressure, try to self-heal by dropping
            # all unused images before failing the deploy. The post-deploy
            # `until=24h` prune only runs on success, so a streak of failed
            # deploys (or fast-churning images) leaves the FS full with no
            # way to recover without manual SSH. This gives us one chance
            # to reclaim space; if still above threshold, abort.
            used=$(df --output=pcent / | tail -1 | tr -dc '0-9')
            if [ "$used" -ge 85 ]; then
              echo "Root FS at ${used}% — running aggressive prune to self-heal."
              docker image prune -a -f || true
              used=$(df --output=pcent / | tail -1 | tr -dc '0-9')
            fi
            if [ "$used" -ge 85 ]; then
              echo "Aborting deploy: root FS is ${used}% full after prune (threshold 85%)."
              df -h /
              exit 1
            fi

            docker pull "$IMAGE"
            docker compose -f docker-compose.prod.yml up -d

            # Verify the running container is on the image we just pushed
            expected=$(docker image inspect "$IMAGE" --format '{{.Id}}')
            actual=$(docker inspect zone-blitz-app-1 --format '{{.Image}}')
            if [ "$expected" != "$actual" ]; then
              echo "Deploy verification failed: app container is on $actual, expected $expected"
              exit 1
            fi

            # Keep the last 24h of images for rollback, drop the rest
            docker image prune -a -f --filter "until=24h"

      - name: Smoke test
        run: |
          expected="${{ github.sha }}"
          for i in $(seq 1 10); do
            body=$(curl -s https://zoneblitz.app/api/health || echo "")
            commit=$(printf '%s' "$body" | jq -r '.commit // empty' 2>/dev/null || echo "")
            if [ "$commit" = "$expected" ]; then
              echo "Health check passed: /api/health.commit = $commit"
              exit 0
            fi
            echo "Attempt $i: commit=$commit expected=$expected body=$body"
            sleep 5
          done
          echo "Health check failed after 10 attempts — deployed code did not reach prod"
          exit 1

name: CI

on:
  workflow_call:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.11
      - run: deno lint

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.11
      - run: deno fmt --check

  migration-journal:
    name: Migration Journal Order
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.11
      - run: deno task db:check-journal

  sim-verify:
    name: Sim Coefficients Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.11
      - run: deno install
      - name: Verify fitted outcome coefficients are up to date
        run: deno task sim:verify

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: zone_blitz
          POSTGRES_PASSWORD: zone_blitz
          POSTGRES_DB: zone_blitz
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zone_blitz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: deno install
      - name: Install client npm deps
        run: npm ci --prefix client
      - name: Run migrations
        run: deno task db:migrate
        env:
          DATABASE_URL: postgres://zone_blitz:zone_blitz@localhost:5432/zone_blitz
      - name: Run tests
        run: deno task test
        env:
          DATABASE_URL: postgres://zone_blitz:zone_blitz@localhost:5432/zone_blitz
      - name: Check Deno coverage thresholds
        run: deno task test:coverage

  e2e:
    name: E2E Tests
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: zone_blitz
          POSTGRES_PASSWORD: zone_blitz
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zone_blitz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.11
      - run: deno install
      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: deno task test:e2e
        env:
          CI: "true"
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: zone_blitz
          POSTGRES_PASSWORD: zone_blitz
          POSTGRES_DB: zone_blitz
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zone_blitz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t zone-blitz:smoke .
      - name: Start container
        run: |
          docker run -d --name smoke-app \
            --network host \
            -e DATABASE_URL="postgres://zone_blitz:zone_blitz@localhost:5432/zone_blitz" \
            zone-blitz:smoke
      - name: Curl health endpoint
        run: |
          for i in $(seq 1 15); do
            status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/health 2>/dev/null || echo "000")
            if [ "$status" = "200" ]; then
              echo "Smoke test passed (HTTP $status)"
              exit 0
            fi
            echo "Attempt $i: HTTP $status, retrying in 2s..."
            sleep 2
          done
          echo "Smoke test failed. Container logs:"
          docker logs smoke-app
          exit 1

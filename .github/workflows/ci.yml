name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spotless:
    name: Spotless
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew spotlessCheck

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: zoneblitz
          POSTGRES_PASSWORD: zoneblitz
          POSTGRES_DB: zoneblitz
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zoneblitz"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew flywayMigrate generateJooq test jacocoTestReport
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            build/reports/tests/test
            build/reports/jacoco/test
            build/test-results/test

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: zoneblitz
          POSTGRES_PASSWORD: zoneblitz
          POSTGRES_DB: zoneblitz
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zoneblitz"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew flywayMigrate generateJooq e2eTest
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-reports
          path: |
            build/reports/tests/e2eTest
            build/test-results/e2eTest

  migrations:
    name: Verify Flyway migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: zoneblitz
          POSTGRES_PASSWORD: zoneblitz
          POSTGRES_DB: zoneblitz
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zoneblitz"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew flywayMigrate flywayValidate

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: zoneblitz
          POSTGRES_PASSWORD: zoneblitz
          POSTGRES_DB: zoneblitz
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zoneblitz"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew flywayMigrate generateJooq
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: zone-blitz:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

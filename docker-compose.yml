services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: zone_blitz
      POSTGRES_PASSWORD: zone_blitz
      POSTGRES_DB: zone_blitz
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/init-e2e-db.sql:/docker-entrypoint-initdb.d/init-e2e-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zone_blitz"]
      interval: 10s
      timeout: 5s
      retries: 5

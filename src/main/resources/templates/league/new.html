<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Create league — Zone Blitz</title>
	<link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
	<main class="max-w-2xl mx-auto p-8">
		<header class="mb-8">
			<a th:href="@{/}" class="text-sm text-slate-500 hover:text-slate-700">&larr; Back to leagues</a>
			<h1 class="text-3xl font-bold mt-2">Create league</h1>
		</header>

		<form th:action="@{/leagues}" th:object="${form}" method="post" class="space-y-6">
			<div>
				<label for="name" class="block text-sm font-medium mb-1">League name</label>
				<input type="text" id="name" th:field="*{name}" maxlength="60" required
				       class="w-full border border-slate-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
				<p th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
				   class="mt-1 text-sm text-red-600"></p>
			</div>

			<div>
				<span class="block text-sm font-medium mb-2">Pick your franchise</span>
				<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
					<label th:each="franchise : ${franchises}"
					       class="flex items-center gap-3 border border-slate-300 rounded-md px-4 py-3 cursor-pointer hover:bg-white has-[:checked]:border-slate-900 has-[:checked]:ring-2 has-[:checked]:ring-slate-900">
						<input type="radio" th:field="*{franchiseId}" th:value="${franchise.id()}" required
						       class="sr-only">
						<span class="flex items-center gap-2">
							<span class="inline-block w-4 h-8 rounded-sm"
							      th:style="'background-color: ' + ${franchise.primaryColor()}"></span>
							<span class="inline-block w-4 h-8 rounded-sm"
							      th:style="'background-color: ' + ${franchise.secondaryColor()}"></span>
						</span>
						<span>
							<span class="block text-sm text-slate-500"
							      th:text="${franchise.city().name() + ', ' + franchise.city().state().code()}">City</span>
							<span class="block font-semibold" th:text="${franchise.name()}">Name</span>
						</span>
					</label>
				</div>
				<p th:if="${#fields.hasErrors('franchiseId')}" th:errors="*{franchiseId}"
				   class="mt-2 text-sm text-red-600"></p>
			</div>

			<div class="bg-slate-100 border border-slate-200 rounded-md p-4 text-sm text-slate-600">
				<p class="font-semibold text-slate-700 mb-1">League settings</p>
				<p>8 teams &middot; 10 game season</p>
				<p class="mt-1 text-slate-500">The other 7 teams will be CPU-controlled.</p>
			</div>

			<div class="flex items-center gap-3">
				<button type="submit"
				        class="px-4 py-2 bg-slate-900 text-white rounded hover:bg-slate-700">
					Create league
				</button>
				<a th:href="@{/}" class="text-sm text-slate-600 hover:text-slate-800">Cancel</a>
			</div>
		</form>
	</main>
</body>
</html>

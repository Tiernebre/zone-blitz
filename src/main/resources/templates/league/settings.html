<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<meta charset="UTF-8">
	<title th:text="${league.leagueName() + ' settings — Zone Blitz'}">League settings — Zone Blitz</title>
	<script>
		if (localStorage.getItem('sidebar-collapsed') === '1') {
			document.documentElement.classList.add('sidebar-collapsed');
		}
	</script>
	<link rel="stylesheet" th:href="@{/css/app.css}">
	<style>
		.sidebar { width: 15rem; transition: width 150ms ease; }
		html.sidebar-collapsed .sidebar { width: 4rem; }
		html.sidebar-collapsed .sidebar-label { display: none; }
		html.sidebar-collapsed .sidebar-toggle-icon { transform: rotate(180deg); }
		html.sidebar-collapsed .sidebar-nav-item { justify-content: center; padding: 0; width: 2.75rem; height: 2.75rem; margin-left: auto; margin-right: auto; }
		#profile-toggle { anchor-name: --profile-anchor; }
			#profile-menu {
				margin: 0;
				inset: auto;
				position: fixed;
				position-anchor: --profile-anchor;
				bottom: calc(anchor(top) + 4px);
				left: anchor(left);
			}
	</style>
	<script th:src="@{/webjars/htmx.org/2.0.4/dist/htmx.min.js}" defer></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
	<div class="flex min-h-screen">
		<aside class="sidebar bg-slate-900 text-slate-100 flex flex-col">
			<div class="flex items-center gap-2 p-2 border-b border-slate-800">
				<span class="sidebar-label font-semibold truncate flex-1 pl-2"
				      th:text="${league.leagueName()}">League name</span>
				<button type="button"
				        id="sidebar-toggle"
				        class="flex items-center justify-center size-11 rounded text-slate-300 hover:bg-slate-800 shrink-0 cursor-pointer">
					<svg th:replace="~{icons :: chevron-left(cls='size-5 sidebar-toggle-icon transition-transform')}"></svg>
				</button>
			</div>
			<nav class="flex flex-col p-2 gap-1 text-sm flex-1">
				<a th:href="@{'/leagues/' + ${league.leagueId()}}"
				   class="sidebar-nav-item flex items-center gap-2 px-3 py-2 rounded hover:bg-slate-800 text-slate-300">
					<svg th:replace="~{icons :: home(cls='size-4 shrink-0')}"></svg>
					<span class="sidebar-label">Home</span>
				</a>
				<a th:href="@{'/leagues/' + ${league.leagueId()} + '/settings'}"
				   class="sidebar-nav-item flex items-center gap-2 px-3 py-2 rounded bg-slate-800 text-white font-medium">
					<svg th:replace="~{icons :: cog(cls='size-4 shrink-0')}"></svg>
					<span class="sidebar-label">Settings</span>
				</a>
			</nav>
			<div class="p-2 border-t border-slate-800 relative">
				<a th:href="@{/}"
				   class="sidebar-nav-item flex items-center gap-2 px-3 py-2 rounded hover:bg-slate-800 text-slate-300 text-sm mb-1">
					<svg th:replace="~{icons :: arrow-left(cls='size-4 shrink-0')}"></svg>
					<span class="sidebar-label">All Leagues</span>
				</a>
				<button type="button"
				        id="profile-toggle"
				        popovertarget="profile-menu"
				        class="sidebar-nav-item flex items-center gap-2 w-full px-3 py-2 rounded hover:bg-slate-800 text-slate-200 text-sm cursor-pointer">
					<svg th:replace="~{icons :: user-circle(cls='size-5 shrink-0')}"></svg>
					<span class="sidebar-label truncate">Profile</span>
				</button>
				<div id="profile-menu" popover
				     class="min-w-48 bg-slate-800 rounded shadow-lg py-1 text-sm">
					<form th:action="@{/logout}" method="post">
						<button type="submit"
						        class="w-full text-left px-3 py-2 hover:bg-slate-700 text-slate-200 cursor-pointer">
							Sign Out
						</button>
					</form>
					<form th:action="@{/account/delete}" method="post"
					      onsubmit="return confirm('Delete your account? This cannot be undone.');">
						<button type="submit"
						        class="w-full text-left px-3 py-2 hover:bg-slate-700 text-red-400 cursor-pointer">
							Delete Account
						</button>
					</form>
				</div>
			</div>
		</aside>

		<main class="flex-1 p-8 max-w-3xl">
			<h1 class="text-3xl font-bold mb-8">Settings</h1>

			<section class="border border-red-200 bg-white rounded-md">
				<header class="px-6 py-4 border-b border-red-200">
					<h2 class="text-lg font-semibold text-red-700">Danger zone</h2>
				</header>
				<div class="px-6 py-4 flex items-start justify-between gap-6">
					<div>
						<p class="font-medium">Delete this league</p>
						<p class="text-sm text-slate-600 mt-1">
							Permanently remove <span class="font-semibold" th:text="${league.leagueName()}">league</span>
							and all of its teams. This cannot be undone.
						</p>
					</div>
					<form th:action="@{'/leagues/' + ${league.leagueId()} + '/delete'}" method="post"
					      th:data-league-name="${league.leagueName()}"
					      onsubmit="return confirm('Delete league &quot;' + this.dataset.leagueName + '&quot;? This cannot be undone.');">
						<button type="submit"
						        class="inline-flex items-center gap-2 px-4 py-2 bg-red-600 text-white text-sm rounded hover:bg-red-700 cursor-pointer">
							<svg th:replace="~{icons :: trash(cls='size-4')}"></svg>
							Delete league
						</button>
					</form>
				</div>
			</section>
		</main>
	</div>
	<script>
		(() => {
			const html = document.documentElement;
			const btn = document.getElementById('sidebar-toggle');
			const sync = () => {
				const collapsed = html.classList.contains('sidebar-collapsed');
				btn.setAttribute('aria-label', collapsed ? 'Expand sidebar' : 'Collapse sidebar');
				btn.setAttribute('aria-expanded', String(!collapsed));
			};
			btn.addEventListener('click', () => {
				const collapsed = html.classList.toggle('sidebar-collapsed');
				localStorage.setItem('sidebar-collapsed', collapsed ? '1' : '0');
				sync();
			});
			sync();
		})();
	</script>
</body>
</html>

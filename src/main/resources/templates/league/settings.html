<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{league/layout :: shell(
          league=${league},
          activeNav='settings',
          pageHeading='Settings',
          pageTitle=${league.leagueName() + ' settings — Zone Blitz'},
          includeHtmx=false,
          content=~{:: #page-content})}">
<body>
	<div id="page-content" class="max-w-3xl">
		<section class="border border-red-200 bg-white rounded-md">
			<header class="px-6 py-4 border-b border-red-200">
				<h2 class="text-lg font-semibold text-red-700">Danger zone</h2>
			</header>
			<div class="px-6 py-4 flex items-start justify-between gap-6">
				<div>
					<p class="font-medium">Delete this league</p>
					<p class="text-sm text-slate-600 mt-1">
						Permanently remove <span class="font-semibold" th:text="${league.leagueName()}">league</span>
						and all of its teams. This cannot be undone.
					</p>
				</div>
				<form th:action="@{'/leagues/' + ${league.leagueId()} + '/delete'}" method="post"
				      th:data-league-name="${league.leagueName()}"
				      onsubmit="return confirm('Delete league &quot;' + this.dataset.leagueName + '&quot;? This cannot be undone.');">
					<button type="submit"
					        class="inline-flex items-center gap-2 px-4 py-2 bg-red-600 text-white text-sm rounded hover:bg-red-700 cursor-pointer">
						<svg th:replace="~{icons :: trash(cls='size-4')}"></svg>
						Delete league
					</button>
				</form>
			</div>
		</section>
	</div>
</body>
</html>

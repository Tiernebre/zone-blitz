<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{league/layout :: shell(
          league=${view.league()},
          activeNav='staff-hiring',
          pageTitle=${view.league().leagueName() + ' — Hire a Head Coach — Zone Blitz'},
          includeHtmx=true,
          content=~{:: #page-content})}">
<body>
	<div id="page-content" class="space-y-4">
		<header>
			<h1 class="text-2xl font-bold" th:text="${view.league().leagueName()}">League</h1>
			<p class="text-sm text-slate-500">
				Phase: Hire Head Coach · Week
				<span th:text="${view.league().phaseWeek()}">1</span>
			</p>
		</header>

		<div th:insert="~{league/hiring/head-coach-fragments :: combined}"></div>
	</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{league/layout :: shell(
          league=${view.league()},
          activeNav='staff-hiring',
          pageHeading='Initial Director of Scouting Hiring Summary',
          pageTitle=${view.league().leagueName() + ' — Director of Scouting Hiring Summary — Zone Blitz'},
          includeHtmx=false,
          content=~{:: #page-content})}">
<body>
	<div id="page-content" class="space-y-4">
		<section class="bg-white border border-slate-200 rounded p-4 shadow-sm">
			<p class="text-sm text-slate-700">
				Every franchise has hired a Director of Scouting. Review the league-wide slate below, then
				<span class="font-medium">Advance</span> to assemble each franchise's subordinate staff.
			</p>
			<p class="mt-2 text-xs text-slate-500"
			   th:text="${view.filledCount()} + ' of ' + ${#lists.size(view.hires())} + ' directors hired'">
				0 of 0 hired
			</p>
		</section>

		<section class="bg-white border border-slate-200 rounded p-4 shadow-sm">
			<h2 class="text-lg font-semibold text-slate-900 mb-3">League Director of Scouting hires</h2>
			<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-2">
				<div th:each="row : ${view.hires()}"
				     th:classappend="${row.isViewerTeam()} ? ' bg-indigo-50 border-indigo-300' : ' bg-slate-50 border-slate-200'"
				     class="border rounded px-3 py-2">
					<div class="flex items-start justify-between gap-2">
						<div class="min-w-0">
							<div class="text-xs font-semibold text-slate-900 truncate"
							     th:text="${row.cityName()} + ' ' + ${row.franchiseName()}">Team</div>
							<div th:if="${row.hire().isPresent()}"
							     class="text-sm text-slate-900 truncate"
							     th:text="${row.hire().get().name()}">Director</div>
							<div th:if="${row.hire().isPresent()}"
							     class="text-xs text-slate-700 truncate"
							     th:text="${row.hire().get().archetype().displayName()}">
								Archetype
							</div>
							<div th:unless="${row.hire().isPresent()}"
							     class="text-xs text-slate-500 italic">Open</div>
						</div>
						<span th:if="${row.hire().isPresent()}"
						      class="inline-block w-2 h-2 rounded-full bg-emerald-600 flex-shrink-0 mt-1"
						      aria-label="Filled"></span>
						<span th:unless="${row.hire().isPresent()}"
						      class="inline-block w-2 h-2 rounded-full bg-amber-500 flex-shrink-0 mt-1"
						      aria-label="Open"></span>
					</div>
				</div>
			</div>
		</section>
	</div>
</body>
</html>

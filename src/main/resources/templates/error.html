<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Zone Blitz — Error</title>
	<link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
	<main class="max-w-xl mx-auto p-8">
		<h1 class="text-3xl font-bold mb-2">Something went wrong</h1>
		<p class="text-sm text-slate-600 mb-1">
			<span th:text="${status}">500</span>
			<span th:if="${error}" th:text="' · ' + ${error}"></span>
		</p>
		<p th:if="${message}" class="text-slate-700 mb-6" th:text="${message}"></p>
		<a th:href="@{/}" class="inline-block px-4 py-2 bg-slate-900 text-white text-sm rounded hover:bg-slate-700">
			Back to home
		</a>
	</main>
</body>
</html>
